[defaults]
inventory = inventories/pod22/hosts.yml
host_key_checking = False
retry_files_enabled = False

# Do not use stdout_callback = yaml.
# community.general.yaml was removed in community.general 12.0.0.
# Use the built-in default callback with YAML formatted results instead.
stdout_callback = ansible.builtin.default
callback_result_format = yaml
bin_ansible_callbacks = True

interpreter_python = auto_silent
roles_path = roles
collections_path = ~/.ansible/collections:/usr/share/ansible/collections

[ssh_connection]
pipelining = True
