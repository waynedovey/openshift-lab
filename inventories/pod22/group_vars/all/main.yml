---
# ---------------------------------------------------------------------------
# OpenShift release / cluster identity
# ---------------------------------------------------------------------------
ocp_version: "4.21"
ocp_release_version: "4.21.20"
cluster_name: hub-sno
base_domain: poc.local
cluster_fqdn: "{{ cluster_name }}.{{ base_domain }}"

# ---------------------------------------------------------------------------
# Static IP plan
# ---------------------------------------------------------------------------
# Default is platform none because Ansible creates the SNO VM on vSphere.
# This avoids requiring a vSphere compute cluster name in install-config.yaml,
# which is important in this lab because the provided inventory is a standalone
# ESXi host managed by vCenter.
#
# For a production vSphere-integrated OpenShift install, change to "vsphere"
# and fill in vsphere_cluster below.
sno_install_platform: none

machine_cidr: 10.23.22.0/24
machine_cidr_prefix: 24
gateway: 10.23.22.1
dns_servers:
  - 10.23.22.100

sno_node:
  hostname: hub-sno-0
  fqdn: hub-sno-0.hub-sno.poc.local
  ip: 10.23.22.90
  # These are VMware VM NIC MACs, not iDRAC MACs.
  # Keep them unique and make sure vCenter accepts the chosen static MAC range.
  mac_eth0: "00:50:56:23:22:90"
  primary_interface: ens192

  # Secondary NIC is disabled by default for the SNO hub.
  # Do not configure VLAN522 for the SNO VM. The hub only needs VLAN3522.
  secondary_nic_enabled: false
  mac_eth1: ""
  secondary_interface: ""

# VIPs are only used when sno_install_platform is "vsphere".
# With platform none/SNO, DNS should point api/api-int/apps to the SNO node IP.
api_vip: 10.23.22.91
ingress_vip: 10.23.22.92
sno_api_ip: "{{ sno_node.ip if sno_install_platform == 'none' else api_vip }}"
sno_ingress_ip: "{{ sno_node.ip if sno_install_platform == 'none' else ingress_vip }}"

# OpenShift internal networks
cluster_network_cidr: 10.128.0.0/14
cluster_network_host_prefix: 23
service_network_cidr: 172.30.0.0/16
network_type: OVNKubernetes

# ---------------------------------------------------------------------------
# vSphere / VMware
# ---------------------------------------------------------------------------
vcenter_hostname: 10.23.22.10
vcenter_username: administrator@vsphere.local
vcenter_password: "{{ vault_vcenter_password }}"
validate_certs: false

# Change these to match vCenter inventory names.
# This starter creates the VM on the standalone ESXi host through vCenter.
vsphere_datacenter: Westpac
vsphere_esxi_hostname: 10.23.22.11
vsphere_resource_pool: Resources
vsphere_folder: "/{{ vsphere_datacenter }}/vm"
vsphere_datastore: datastore1

# Only required when sno_install_platform: vsphere.
# Leave unset/empty when using the default platform none mode.
vsphere_cluster: ""

# Port group for the SNO VM machine network. This must map to VLAN 3522 on the ESXi/vSwitch side.
# If discovery only shows MGMT and MGMT is already on VLAN 3522, set this to MGMT instead.
vm_network_eth0: MGMT

# Optional secondary NIC. Disabled by default because the SNO hub only needs VLAN 3522.
# Leave blank unless sno_node.secondary_nic_enabled is set to true.
vm_network_eth1: ""

# Optional helper playbook 00_create_sno_primary_portgroup.yml / 02_create_vsphere_vm.yml uses these values.
# Use VLAN ID 0 when the ESXi physical uplink switchport is ACCESS VLAN 3522.
# Use VLAN ID 3522 only when the ESXi uplink is a TRUNK carrying VLAN 3522.
sno_primary_portgroup_vlan_id: 0
sno_primary_portgroup_auto_create: false

# Auto-create mode:
#   auto        - use a standard vSwitch when esxi_vswitch_name exists; otherwise use the distributed switch
#   standard    - force ESXi standard vSwitch creation
#   distributed - force vSphere Distributed Switch port group creation
sno_primary_portgroup_create_mode: auto

# Standard vSwitch fallback. If your ESXi host has no vSwitch0, the playbook will try the DVS below.
esxi_vswitch_name: vSwitch0

# vSphere Distributed Switch fallback. Your discovery output shows DSwitch-DVUplinks-18, so DSwitch is the likely DVS name.
sno_primary_dvs_name: DSwitch
sno_primary_dvs_num_ports: 128

# SNO VM sizing. Increase disk for ACM / hub workloads if needed.
sno_vm_name: hub-sno
sno_vm_cpu: 16
sno_vm_memory_mb: 65536
sno_vm_disk_gb: 250

# Optional second data disk for later hub workloads, LVM/ODF experiments, image registry, etc.
# This playbook only attaches the disk; it does not format or mount it inside OpenShift/RHCOS.
sno_vm_extra_disk_enabled: true
sno_vm_extra_disk_gb: 300
sno_vm_extra_disk_type: thin

sno_vm_guest_id: rhel9_64Guest
sno_vm_firmware: efi
# Required for OpenShift/RHCOS on vSphere so disks are mounted and identified correctly.
sno_vm_disk_enable_uuid: true
# Power off before configure so CD-ROM, boot order, disks, and disk.EnableUUID apply cleanly.
sno_vm_poweroff_before_configure: true
# Set true only when you want the playbook to delete/recreate the SNO VM for a clean install.
sno_vm_recreate: false

# Datastore path where the generated agent ISO will be uploaded.
# Default upload method is esxi_ssh because some lab vCenter datastore HTTP APIs
# return 404 when community.vmware.vsphere_file tries to create new folders.
# The VM still attaches the ISO through vCenter using iso_vsphere_path.
#
# Supported values:
#   esxi_ssh    - create folders/upload ISO through SSH/SCP to the ESXi datastore path
#   vcenter_api - use community.vmware.vsphere_file/vsphere_copy through vCenter
iso_upload_method: esxi_ssh

# ESXi SSH/SCP upload settings. Make sure SSH is enabled on the ESXi host.
esxi_hostname: "{{ vsphere_esxi_hostname }}"
esxi_username: root
esxi_password: "{{ vault_esxi_password }}"
esxi_datastore_mount: "/vmfs/volumes/{{ vsphere_datastore }}"

# Set true only if you need to hide all ESXi SSH/SCP task output. Default false so upload failures show useful stderr.
esxi_upload_no_log: false


# Use a unique ISO filename for each playbook run so ESXi does not fail with
# "Device or resource busy" when the previous ISO is still mounted by a VM.
iso_unique_per_upload: true

# During Agent ISO installs, the VM must not reboot back into the ISO after RHCOS is written to disk.
# 02_create_vsphere_vm.yml sets boot order to disk first with CD-ROM fallback.
# 03_wait_install.yml also tries a best-effort CD-ROM disconnect after disk write reaches 100%.
# Some vSphere/IDE CD-ROM combos cannot hot-disconnect while powered on; by default that warning does not fail the install.
sno_auto_disconnect_iso_after_disk_write: true
sno_set_boot_disk_first_after_iso_disconnect: true
sno_iso_disconnect_fail_on_error: false
sno_iso_disconnect_log_retries: 240
sno_iso_disconnect_log_delay_seconds: 15
sno_bootstrap_wait_async_timeout_seconds: 7200
sno_bootstrap_wait_poll_retries: 240
sno_bootstrap_wait_poll_delay_seconds: 30

# Leave iso_datastore_folder empty ("") to upload to the datastore root.
iso_datastore_folder: iso/ocp
iso_datastore_name: "{{ cluster_name }}-agent.x86_64.iso"
iso_datastore_path: "{{ ((iso_datastore_folder | default('') | trim('/')) ~ '/') if ((iso_datastore_folder | default('') | trim('/')) | length > 0) else '' }}{{ iso_datastore_name }}"
iso_vsphere_path: "[{{ vsphere_datastore }}] {{ iso_datastore_path }}"
esxi_iso_dir: "{{ esxi_datastore_mount }}{{ '/' ~ (iso_datastore_folder | trim('/')) if (iso_datastore_folder | default('') | trim('/') | length > 0) else '' }}"
esxi_iso_path: "{{ esxi_datastore_mount }}/{{ iso_datastore_path }}"

# ---------------------------------------------------------------------------
# Build paths on the Ansible controller
# ---------------------------------------------------------------------------
repo_root: "{{ playbook_dir }}/.."
build_root: "{{ repo_root }}/build/{{ cluster_name }}"
install_dir: "{{ build_root }}/install"
rendered_dir: "{{ build_root }}/rendered"
agent_iso_local: "{{ install_dir }}/agent.x86_64.iso"

# These come from vault.yml
pull_secret: "{{ vault_pull_secret }}"
ssh_pub_key: "{{ vault_ssh_public_key }}"

# ---------------------------------------------------------------------------
# AD DNS optional automation
# ---------------------------------------------------------------------------
ad_dns_zone: poc.local
ad_dns_records:
  - name: "api.{{ cluster_name }}"
    type: A
    value: "{{ sno_api_ip }}"
  - name: "api-int.{{ cluster_name }}"
    type: A
    value: "{{ sno_api_ip }}"
  - name: "*.apps.{{ cluster_name }}"
    type: A
    value: "{{ sno_ingress_ip }}"
  - name: "{{ sno_node.hostname }}.{{ cluster_name }}"
    type: A
    value: "{{ sno_node.ip }}"

# ---------------------------------------------------------------------------
# LVM Storage on the SNO hub
# ---------------------------------------------------------------------------
lvm_enabled: true
lvm_namespace: openshift-storage
lvm_operatorgroup_name: openshift-storage-operatorgroup
lvm_subscription_name: lvms-operator
lvm_operator_package: lvms-operator
lvm_operator_channel: "stable-{{ ocp_version }}"
lvm_operator_source: redhat-operators
lvm_operator_source_namespace: openshift-marketplace
lvm_install_plan_approval: Automatic

# The second vSphere disk attached to the SNO VM is expected to appear as /dev/sdb.
# If the disk appears differently, update this list after running:
#   oc debug node/hub-sno-0 -- chroot /host lsblk -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT
lvm_cluster_name: lvmcluster
lvm_device_class_name: vg1
lvm_storage_class_name: "lvms-{{ lvm_device_class_name }}"
lvm_device_paths:
  - /dev/sdb
lvm_node_selector_hostname: "{{ sno_node.hostname }}"
lvm_thin_pool_name: thin-pool-1
lvm_thin_pool_size_percent: 90
lvm_thin_pool_overprovision_ratio: 10
lvm_make_default_storageclass: true
lvm_rendered_dir: "{{ build_root }}/lvm"

# ---------------------------------------------------------------------------
# ACM hub bootstrap
# ---------------------------------------------------------------------------
hub_kubeconfig: "{{ install_dir }}/auth/kubeconfig"

acm_namespace: open-cluster-management
acm_operatorgroup_name: open-cluster-management-group
# Check the available channel on your catalog if this changes:
# oc get packagemanifest advanced-cluster-management -n openshift-marketplace -o jsonpath='{.status.channels[*].name}'
acm_subscription_channel: release-2.16
acm_install_plan_approval: Automatic
acm_operator_source: redhat-operators
acm_operator_source_namespace: openshift-marketplace
acm_multiclusterhub_name: multiclusterhub
# Basic is much lighter and is preferred for a lab/SNO hub.
acm_availability_config: Basic
acm_disable_hub_self_management: false

# Assisted service persistent storage. Leave storageClass blank to use the cluster default StorageClass.
assisted_service_configure: true
assisted_service_storage_class: "{{ lvm_storage_class_name if (lvm_make_default_storageclass | default(true) | bool) else '' }}"
assisted_service_database_storage: 10Gi
assisted_service_filesystem_storage: 100Gi
assisted_service_image_storage: 50Gi


# Assisted Image Service route used by bare-metal hosts to download the live rootfs.
# Bare-metal nodes must resolve assisted-image-service-<namespace>.apps.<hub cluster fqdn> to the SNO ingress IP.
assisted_image_service_namespace: multicluster-engine
assisted_image_service_route_name: assisted-image-service

# ---------------------------------------------------------------------------
# Managed bare-metal cluster deployed by ACM / Assisted Installer
# ---------------------------------------------------------------------------
bm_cluster_name: site-a
bm_cluster_display_name: Site-A
bm_base_domain: poc.local
bm_fqdn: "{{ bm_cluster_name }}.{{ bm_base_domain }}"
bm_clusterset: site-a-baremetal

# Release image used by the managed bare-metal cluster.
# Keep this aligned with a valid OpenShift release payload available to your environment.
bm_cluster_image_set_name: "openshift-v{{ ocp_version }}"
bm_cluster_release_image: "quay.io/openshift-release-dev/ocp-release:{{ ocp_release_version }}-x86_64"

bm_machine_cidr: 10.23.22.0/24
bm_machine_cidr_prefix: 24
bm_gateway: 10.23.22.1
bm_dns_servers:
  - 10.23.22.100
bm_api_vip: 10.23.22.120
bm_ingress_vip: 10.23.22.121

bm_cluster_network_cidr: 10.132.0.0/14
bm_cluster_network_host_prefix: 23
bm_service_network_cidr: 172.31.0.0/16
bm_network_type: OVNKubernetes

# 3 masters + 3 workers by default. For compact 3-node, disable b08-36, b09-33, b09-34 and set worker count to 0.
bm_control_plane_count: 3
bm_worker_count: 0
bm_pull_secret_name: pull-secret
bm_enable_ironic_agent: true
idrac_enforce_same_firmware: true

# These BMC addresses assume no provisioning network and use Redfish virtual media.
# Confirm the System path on each iDRAC. Dell commonly uses /redfish/v1/Systems/System.Embedded.1
idrac_redfish_system_path: /redfish/v1/Systems/System.Embedded.1

# IMPORTANT: The 10.23.22.80-85 addresses below are treated as iDRAC/BMC addresses.
# The OpenShift host OS static IPs are set separately as 10.23.22.110-115.
# Change the boot_mac values if the listed BC:97:E1 values are not the NICs cabled to VLAN 3522.
bm_nodes:
  - name: b08-33
    hostname: b08-33
    role: master
    enabled: true
    bmc_ip: 10.23.22.80
    bmc_address: "redfish-virtualmedia://10.23.22.80{{ idrac_redfish_system_path }}"
    # iDRAC shows this as Integrated NIC 1 Port 1 Partition 1.
    # RHCOS console shows the Linux interface name as eno33np0.
    boot_mac: "BC:97:E1:C3:F6:E0"
    ip: 10.23.22.110
    primary_interface: eno33np0
    secondary_interface: eno34np1
    secondary_mac: ""
    idrac_firmware_expected: "7.30.10.50"
  - name: b08-34
    hostname: b08-34
    role: master
    enabled: true
    bmc_ip: 10.23.22.81
    bmc_address: "redfish-virtualmedia://10.23.22.81{{ idrac_redfish_system_path }}"
    boot_mac: "BC:97:E1:7E:99:60"
    ip: 10.23.22.111
    primary_interface: eno33np0
    secondary_interface: eno34np1
    secondary_mac: ""
    idrac_firmware_expected: "7.30.10.50"
  - name: b08-35
    hostname: b08-35
    role: master
    enabled: true
    bmc_ip: 10.23.22.82
    bmc_address: "redfish-virtualmedia://10.23.22.82{{ idrac_redfish_system_path }}"
    boot_mac: "BC:97:E1:7E:99:F0"
    ip: 10.23.22.112
    primary_interface: eno33np0
    secondary_interface: eno34np1
    secondary_mac: ""
    idrac_firmware_expected: "7.30.10.50"
  - name: b08-36
    hostname: b08-36
    role: worker
    enabled: false
    bmc_ip: 10.23.22.83
    bmc_address: "redfish-virtualmedia://10.23.22.83{{ idrac_redfish_system_path }}"
    boot_mac: "BC:97:E1:7E:98:D0"
    ip: 10.23.22.113
    primary_interface: eno1
    secondary_interface: eno2
    secondary_mac: ""
    idrac_firmware_expected: "7.30.10.50"
  - name: b09-33
    hostname: b09-33
    role: worker
    enabled: false
    bmc_ip: 10.23.22.84
    bmc_address: "redfish-virtualmedia://10.23.22.84{{ idrac_redfish_system_path }}"
    boot_mac: "CHANGE_ME_B09_33_BOOT_NIC_MAC"
    ip: 10.23.22.114
    primary_interface: eno1
    secondary_interface: eno2
    secondary_mac: ""
    idrac_firmware_expected: "7.30.10.50"
  - name: b09-34
    hostname: b09-34
    role: worker
    enabled: false
    bmc_ip: 10.23.22.85
    bmc_address: "redfish-virtualmedia://10.23.22.85{{ idrac_redfish_system_path }}"
    boot_mac: "CHANGE_ME_B09_34_BOOT_NIC_MAC"
    ip: 10.23.22.115
    primary_interface: eno1
    secondary_interface: eno2
    secondary_mac: ""
    idrac_firmware_expected: "7.30.10.50"

bm_dns_records:
  - name: "api.{{ bm_cluster_name }}"
    type: A
    value: "{{ bm_api_vip }}"
  - name: "api-int.{{ bm_cluster_name }}"
    type: A
    value: "{{ bm_api_vip }}"
  - name: "*.apps.{{ bm_cluster_name }}"
    type: A
    value: "{{ bm_ingress_vip }}"


# ---------------------------------------------------------------------------
# Site-B managed bare-metal cluster
# ---------------------------------------------------------------------------
# Site-B uses the remaining three Dell nodes as a compact 3-node OpenShift cluster.
# IMPORTANT: b09-33 and b09-34 boot_mac values are placeholders until you run
# playbooks/05_discover_site_b_idrac_nics.yml and choose the NIC cabled to VLAN 3522.
site_b_cluster_name: site-b
site_b_cluster_display_name: Site-B
site_b_base_domain: poc.local
site_b_fqdn: "{{ site_b_cluster_name }}.{{ site_b_base_domain }}"
site_b_clusterset: site-b-baremetal

site_b_machine_cidr: 10.23.22.0/24
site_b_machine_cidr_prefix: 24
site_b_gateway: 10.23.22.1
site_b_dns_servers:
  - 10.23.22.100
site_b_api_vip: 10.23.22.130
site_b_ingress_vip: 10.23.22.131

site_b_cluster_network_cidr: 10.136.0.0/14
site_b_cluster_network_host_prefix: 23
site_b_service_network_cidr: 172.32.0.0/16
site_b_network_type: OVNKubernetes

site_b_control_plane_count: 3
site_b_worker_count: 0
site_b_pull_secret_name: pull-secret

site_b_nodes:
  - name: b08-36
    hostname: b08-36
    role: master
    enabled: true
    bmc_ip: 10.23.22.83
    bmc_address: "redfish-virtualmedia://10.23.22.83{{ idrac_redfish_system_path }}"
    boot_mac: "BC:97:E1:7E:98:D0"
    ip: 10.23.22.113
    primary_interface: eno33np0
    secondary_interface: eno34np1
    secondary_mac: ""
    idrac_firmware_expected: "7.30.10.50"
  - name: b09-33
    hostname: b09-33
    role: master
    enabled: true
    bmc_ip: 10.23.22.84
    bmc_address: "redfish-virtualmedia://10.23.22.84{{ idrac_redfish_system_path }}"
    boot_mac: "CHANGE_ME_B09_33_BOOT_NIC_MAC"
    ip: 10.23.22.114
    primary_interface: eno33np0
    secondary_interface: eno34np1
    secondary_mac: ""
    idrac_firmware_expected: "7.30.10.50"
  - name: b09-34
    hostname: b09-34
    role: master
    enabled: true
    bmc_ip: 10.23.22.85
    bmc_address: "redfish-virtualmedia://10.23.22.85{{ idrac_redfish_system_path }}"
    boot_mac: "CHANGE_ME_B09_34_BOOT_NIC_MAC"
    ip: 10.23.22.115
    primary_interface: eno33np0
    secondary_interface: eno34np1
    secondary_mac: ""
    idrac_firmware_expected: "7.30.10.50"

site_b_dns_records:
  - name: "api.{{ site_b_cluster_name }}"
    type: A
    value: "{{ site_b_api_vip }}"
  - name: "api-int.{{ site_b_cluster_name }}"
    type: A
    value: "{{ site_b_api_vip }}"
  - name: "*.apps.{{ site_b_cluster_name }}"
    type: A
    value: "{{ site_b_ingress_vip }}"

site_b_rendered_dir: "{{ build_root }}/baremetal/{{ site_b_cluster_name }}"

# Rendered manifest locations
acm_rendered_dir: "{{ build_root }}/acm"
bm_rendered_dir: "{{ build_root }}/baremetal/{{ bm_cluster_name }}"

# ---------------------------------------------------------------------------
# Site-A HCP hosting setup managed from RHACM policies
# ---------------------------------------------------------------------------
site_a_policy_namespace: site-a-policies
site_a_policy_cluster_label_key: hcp-hosting
site_a_policy_cluster_label_value: "true"
site_a_policy_placement_name: site-a-placement
site_a_policy_remediation_action: enforce
# Lab-only: allow placement to select Site-A even while RHACM marks it Unknown/Unreachable.
# Keep false for production; fix cluster availability instead.
site_a_policy_tolerate_unreachable: true
site_a_policy_rendered_dir: "{{ build_root }}/site-a-hcp-policies"

# OpenShift Virtualization on Site-A
site_a_virt_namespace: openshift-cnv
site_a_virt_subscription_channel: stable
site_a_virt_operator_source: redhat-operators
site_a_virt_operator_source_namespace: openshift-marketplace
site_a_virt_install_plan_approval: Automatic

# Multicluster Engine on Site-A for HCP hosting
site_a_mce_namespace: multicluster-engine
site_a_mce_subscription_channel: stable-2.11
site_a_mce_operator_source: redhat-operators
site_a_mce_operator_source_namespace: openshift-marketplace
site_a_mce_install_plan_approval: Automatic
site_a_mce_name: multiclusterengine

# MetalLB on Site-A for HCP LoadBalancer services
site_a_metallb_namespace: metallb-system
site_a_metallb_subscription_channel: stable
site_a_metallb_operator_source: redhat-operators
site_a_metallb_operator_source_namespace: openshift-marketplace
site_a_metallb_install_plan_approval: Automatic
site_a_metallb_instance_name: metallb
site_a_metallb_pool_name: hcp-lb-pool
site_a_metallb_l2_advertisement_name: hcp-l2-advertisement
# Five IPs reserved for HCP-related LoadBalancer services. Adjust if these are already in use.
site_a_hcp_metallb_range: 10.23.22.122-10.23.22.126

# Optional: install LVM on Site-A as part of the same policy set.
# Leave disabled until you confirm the unused disk device paths on the Site-A bare-metal nodes.
site_a_lvm_policy_enabled: false
site_a_lvm_namespace: openshift-storage
site_a_lvm_subscription_channel: "stable-{{ ocp_version }}"
site_a_lvm_operator_source: redhat-operators
site_a_lvm_operator_source_namespace: openshift-marketplace
site_a_lvm_install_plan_approval: Automatic
site_a_lvm_cluster_name: lvmcluster
site_a_lvm_device_class_name: vg1
site_a_lvm_storage_class_name: "lvms-{{ site_a_lvm_device_class_name }}"
site_a_lvm_device_paths: []
# Safety guard for lab LVM installs. Keep false unless you are happy for LVMS to claim all unused disks.
site_a_lvm_allow_all_unused_devices: false
site_a_lvm_make_default_storageclass: true

# Test HCP cluster to create from Site-A, using the kubevirt platform.
site_a_hcp_cluster_name: hcp-test
site_a_hcp_namespace: clusters
site_a_hcp_nodepool_replicas: 2
site_a_hcp_worker_cores: 4
site_a_hcp_worker_memory: 8Gi
site_a_hcp_release_image: "{{ bm_cluster_release_image }}"
# Leave blank to auto-detect the Site-A default StorageClass at create time.
# If no default exists, set this explicitly, for example: lvms-vg1
site_a_hcp_etcd_storage_class: "{{ site_a_lvm_storage_class_name }}"
site_a_kubeconfig_file: "{{ build_root }}/site-a/auth/kubeconfig"
site_a_hcp_pull_secret_file: "{{ build_root }}/site-a-hcp/pull-secret.json"
site_a_hcp_ssh_key_file: "{{ build_root }}/site-a-hcp/ssh.pub"
site_a_hcp_cli_path: "{{ build_root }}/bin/hcp"
