---
all:
  children:
    ansible_controller:
      hosts:
        localhost:
          ansible_connection: local
          # Use the repo virtual environment when it is active. This keeps Ubuntu
          # 24.04 Python packages isolated from the system Python.
          ansible_python_interpreter: "{{ lookup('env', 'VIRTUAL_ENV') + '/bin/python3' if lookup('env', 'VIRTUAL_ENV') else '/usr/bin/python3' }}"
    windows_dns:
      hosts:
        addc.poc.local:
          ansible_host: 10.23.22.100
          ansible_connection: winrm
          ansible_winrm_transport: ntlm
          ansible_port: 5985
          ansible_winrm_server_cert_validation: ignore
          ansible_user: "{{ vault_ad_username }}"
          ansible_password: "{{ vault_ad_password }}"
