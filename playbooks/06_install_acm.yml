---
- name: Install Red Hat Advanced Cluster Management on the SNO hub
  hosts: ansible_controller
  gather_facts: false
  environment:
    KUBECONFIG: "{{ hub_kubeconfig }}"
  tasks:
    - name: Create ACM rendered directory
      ansible.builtin.file:
        path: "{{ acm_rendered_dir }}"
        state: directory
        mode: '0750'

    - name: Render ACM operator manifests
      ansible.builtin.template:
        src: "{{ repo_root }}/templates/acm/{{ item }}"
        dest: "{{ acm_rendered_dir }}/{{ item | regex_replace('\\.j2$', '') }}"
        mode: '0600'
      loop:
        - 00-namespace.yaml.j2
        - 01-operatorgroup.yaml.j2
        - 02-subscription.yaml.j2
        - 03-multiclusterhub.yaml.j2

    - name: Apply ACM namespace, OperatorGroup, and Subscription
      ansible.builtin.command: "oc apply -f {{ acm_rendered_dir }}/{{ item }}"
      changed_when: "'created' in acm_apply.stdout or 'configured' in acm_apply.stdout"
      register: acm_apply
      loop:
        - 00-namespace.yaml
        - 01-operatorgroup.yaml
        - 02-subscription.yaml

    - name: Wait for ACM Subscription to exist
      ansible.builtin.command: "oc -n {{ acm_namespace }} get subscription advanced-cluster-management"
      register: acm_subscription
      changed_when: false
      failed_when: false
      retries: 40
      delay: 15
      until: acm_subscription.rc == 0

    - name: Wait for MultiClusterHub CRD to appear
      ansible.builtin.command: oc get crd multiclusterhubs.operator.open-cluster-management.io
      register: mch_crd
      changed_when: false
      failed_when: false
      retries: 80
      delay: 15
      until: mch_crd.rc == 0

    - name: Check whether MultiClusterHub already exists
      ansible.builtin.command: >-
        oc -n {{ acm_namespace }} get multiclusterhub {{ acm_multiclusterhub_name }}
        -o jsonpath='{.status.phase}'
      register: existing_mch
      changed_when: false
      failed_when: false

    - name: Print existing MultiClusterHub state when present
      ansible.builtin.debug:
        msg: "Existing MultiClusterHub phase={{ existing_mch.stdout | default('unknown') }}. Skipping create and waiting for Running."
      when: existing_mch.rc == 0

    - name: Wait for ACM validating webhook service endpoints before creating MultiClusterHub
      ansible.builtin.command: >-
        oc -n {{ acm_namespace }} get endpoints multiclusterhub-operator-webhook
        -o jsonpath='{.subsets[*].addresses[*].ip}'
      register: mch_webhook_endpoints
      changed_when: false
      failed_when: false
      retries: 60
      delay: 10
      until:
        - mch_webhook_endpoints.rc == 0
        - mch_webhook_endpoints.stdout | length > 0
      when: existing_mch.rc != 0

    - name: Create MultiClusterHub
      ansible.builtin.command: "oc apply -f {{ acm_rendered_dir }}/03-multiclusterhub.yaml"
      register: create_mch
      changed_when: "'created' in create_mch.stdout or 'configured' in create_mch.stdout"
      failed_when: false
      retries: 30
      delay: 10
      until: create_mch.rc == 0
      when: existing_mch.rc != 0

    - name: Show MultiClusterHub create output if retries were needed
      ansible.builtin.debug:
        var: create_mch.stderr_lines
      when:
        - existing_mch.rc != 0
        - create_mch is defined
        - create_mch.rc is defined
        - create_mch.rc != 0

    - name: Wait for MultiClusterHub to report Running
      ansible.builtin.command: >-
        oc -n {{ acm_namespace }} get multiclusterhub {{ acm_multiclusterhub_name }}
        -o jsonpath='{.status.phase}'
      register: mch_phase
      changed_when: false
      failed_when: false
      retries: 120
      delay: 30
      until: mch_phase.rc == 0 and mch_phase.stdout == 'Running'

    - name: Show ACM hub state
      ansible.builtin.command: "oc -n {{ acm_namespace }} get mch {{ acm_multiclusterhub_name }}"
      changed_when: false
      register: mch_state

    - name: Print ACM state
      ansible.builtin.debug:
        var: mch_state.stdout_lines
