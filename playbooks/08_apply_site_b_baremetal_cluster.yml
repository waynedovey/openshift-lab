---
- import_playbook: 08_apply_baremetal_cluster.yml
  vars:
    bm_cluster_name: "{{ site_b_cluster_name }}"
    bm_cluster_display_name: "{{ site_b_cluster_display_name }}"
    bm_base_domain: "{{ site_b_base_domain }}"
    bm_fqdn: "{{ site_b_fqdn }}"
    bm_clusterset: "{{ site_b_clusterset }}"
    bm_machine_cidr: "{{ site_b_machine_cidr }}"
    bm_machine_cidr_prefix: "{{ site_b_machine_cidr_prefix }}"
    bm_gateway: "{{ site_b_gateway }}"
