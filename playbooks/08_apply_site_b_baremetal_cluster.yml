    bm_cluster_network_cidr: "{{ site_b_cluster_network_cidr }}"
    bm_cluster_network_host_prefix: "{{ site_b_cluster_network_host_prefix }}"
    bm_service_network_cidr: "{{ site_b_service_network_cidr }}"
